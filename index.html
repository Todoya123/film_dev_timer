<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胶片冲洗全能大师 Lab-Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <style>
        :root {
            --bg: #0d0d0e;
            --card: #1c1c1e;
            --primary: #ffa726;
            --secondary: #26c6da;
            --text: #ffffff;
            --success: #66bb6a;
            --danger: #ef5350;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }

        .config-area { width: 100%; max-width: 500px; margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 12px; }
        
        label { font-size: 0.75rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
        
        select, input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #3a3a3c;
            background: #2c2c2e; color: #fff; font-size: 0.95rem; outline: none; box-sizing: border-box;
        }

        select:focus { border-color: var(--primary); }

        .stat-grid {
            width: 100%; max-width: 500px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px;
        }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-card small { display: block; font-size: 0.65rem; color: #8e8e93; margin-bottom: 4px; }
        .stat-card b { font-size: 1.1rem; color: var(--secondary); }

        .timer-panel {
            width: 100%; max-width: 500px; background: var(--card); border-radius: 24px; padding: 25px;
            box-sizing: border-box; border-bottom: 6px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative;
        }

        #step-display { font-size: 1.5rem; color: var(--primary); text-align: center; font-weight: bold; }
        #timer-display { font-size: 6.5rem; font-weight: 900; text-align: center; margin: 10px 0; font-variant-numeric: tabular-nums; letter-spacing: -2px; }
        
        .progress-wrap { width: 100%; height: 8px; background: #3a3a3c; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s linear; }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .meta-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .meta-box span { display: block; color: #8e8e93; font-size: 0.7rem; margin-bottom: 4px; }
        .meta-box div { font-size: 0.9rem; line-height: 1.4; }

        .action-bar { display: flex; gap: 12px; width: 100%; max-width: 500px; margin-top: 20px; }
        button { flex: 1; padding: 18px; border-radius: 14px; border: none; font-weight: bold; font-size: 1.1rem; color: white; cursor: pointer; }
        .btn-start { background: var(--success); }
        .btn-pause { background: var(--danger); }
        .btn-next { background: #3a3a3c; }

        @keyframes alert-bg { 50% { background: #7f0000; } }
        .finished { animation: alert-bg 0.6s infinite; }
    </style>
</head>
<body>

    <div class="config-area">
        <div class="row">
            <div>
                <label>1. 工艺与型号</label>
                <select id="recipe-sel" onchange="init()">
                    <optgroup label="彩色负片 (C-41)">
                        <option value="C41_STD">C-41 标准 (Gold/Portra)</option>
                        <option value="LuckyC200">Lucky 乐凯 C200 特调</option>
                    </optgroup>
                    <optgroup label="电影胶片 (ECN-2)">
                        <option value="ECN2_STD">ECN-2 标准电影工艺</option>
                        <option value="Kodak5207">Kodak 5207 (250D)</option>
                        <option value="Kodak2383">Kodak 2383 (C-41改冲)</option>
                    </optgroup>
                    <optgroup label="反转/正冲">
                        <option value="E6_STD">E-6 标准反转片</option>
                        <option value="XPRO_E6">负片正冲 (E-6药水)</option>
                    </optgroup>
                    <optgroup label="黑白 (B&W)">
                        <option value="BW_D76">黑白标准 (D-76 1:1)</option>
                        <option value="Kodak2460">Kodak 2460 (16mm正片)</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <label>卷/层数</label>
                <input type="number" id="rolls" value="1" min="1" max="5" onchange="init()">
            </div>
        </div>

        <label>2. 显影罐选择</label>
        <select id="tank-sel" onchange="init()">
            <optgroup label="Lab-Box (明室冲洗罐)">
                <option value="labbox_135_r">Lab-Box 135 (滚冲 - 270ml)</option>
                <option value="labbox_135_i">Lab-Box 135 (手冲 - 490ml)</option>
                <option value="labbox_120_r">Lab-Box 120 (滚冲 - 300ml)</option>
                <option value="labbox_120_i">Lab-Box 120 (手冲 - 500ml)</option>
            </optgroup>
            <optgroup label="JOBO (德国)">
                <option value="j1510r">JOBO 1510 (滚冲 - 140ml)</option>
                <option value="j1510i">JOBO 1510 (手冲 - 250ml)</option>
                <option value="j1520r">JOBO 1520 (滚冲 - 240ml)</option>
            </optgroup>
            <optgroup label="Paterson / AP">
                <option value="p1">Paterson 单卷罐 (290ml)</option>
                <option value="p2">Paterson 双卷罐 (580ml)</option>
                <option value="ap1">AP 单卷罐 (375ml)</option>
            </optgroup>
            <optgroup label="LOMO UPB-16">
                <option value="upb16_16">UPB-16 (16mm电影卷 - 1.2L)</option>
                <option value="upb16_8">UPB-16 (8mm电影卷 - 1.1L)</option>
            </optgroup>
        </select>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><small>注药量</small><b id="vol-out">--</b></div>
        <div class="stat-card"><small>时间补偿</small><b id="comp-out">0%</b></div>
        <div class="stat-card"><small>步骤数</small><b id="step-count">--</b></div>
    </div>

    <div style="width:100%; max-width:500px; margin-bottom: 20px;">
        <label>药水补偿 (显影环节 %)</label>
        <input type="range" id="comp-slide" min="0" max="40" step="5" value="0" oninput="init()">
    </div>

    <div class="timer-panel" id="t-panel">
        <div id="step-display">准备绪</div>
        <div id="timer-display">00:00</div>
        <div class="progress-wrap"><div id="progress-fill"></div></div>
        
        <div class="meta-grid">
            <div class="meta-box"><span>🌡️ 目标温度</span><div id="m-temp">--</div></div>
            <div class="meta-box"><span>🔄 动作建议</span><div id="m-action">--</div></div>
            <div class="meta-box" style="grid-column: span 2;"><span>⚠️ 核心笔记</span><div id="m-note">--</div></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-start" onclick="startTimer()">开始计时</button>
        <button class="btn-pause" onclick="pauseTimer()">暂停</button>
        <button class="btn-next" onclick="nextStep()">下一步</button>
    </div>

    <script>
        const noSleep = new NoSleep();
        
        const TANKS = {
            labbox_135_r: 270, labbox_135_i: 490,
            labbox_120_r: 300, labbox_120_i: 500,
            j1510r: 140, j1510i: 250, j1520r: 240,
            p1: 290, p2: 580, ap1: 375,
            upb16_16: 1200, upb16_8: 1100
        };

        const DATA = {
            C41_STD: [{n:"1.预洗",t:60,tp:"38°C",a:"慢速",m:"润滑并预热"},{n:"2.彩显",t:195,tp:"38.0°C",a:"标准颠倒",m:"控温±0.3°C"},{n:"3.漂定",t:390,tp:"38°C",a:"翻转",m:"注意排气"},{n:"4.水洗",t:180,tp:"35°C",a:"换水",m:"洗净药水"}],
            LuckyC200: [{n:"1.预洗",t:60,tp:"38°C",a:"轻微",m:"保护弱质药膜"},{n:"2.彩显",t:195,tp:"38.0°C",a:"标准",m:"乐凯特调"},{n:"3.漂定",t:390,tp:"38°C",a:"标准",m:"彻底脱银"}],
            ECN2_STD: [{n:"1.除碳",t:45,tp:"38°C",a:"剧烈",m:"除碳至水清"},{n:"2.电影彩显",t:180,tp:"41.1°C",a:"快速",m:"ECN-2高温"},{n:"3.停影",t:30,tp:"38°C",a:"连续",m:"秒停"},{n:"4.漂定",t:360,tp:"38°C",a:"翻转",m:"脱银"}],
            Kodak5207: [{n:"1.去碳",t:45,tp:"38°C",a:"剧烈",m:"Vision3电影卷"},{n:"2.电影彩显",t:180,tp:"41.1°C",a:"快速",m:"ECN-2标准"}],
            Kodak2383: [{n:"1.除碳",t:30,tp:"30°C",a:"剧烈",m:"先除碳层"},{n:"2.彩显(低反差)",t:150,tp:"35°C",a:"慢速",m:"低温低反差冲洗"},{n:"3.漂定",t:420,tp:"35°C",a:"慢速",m:"加长时间"}],
            XPRO_E6: [{n:"1.首显(E6)",t:360,tp:"38°C",a:"标准",m:"负正冲核心环节"},{n:"2.水洗",t:120,tp:"38°C",a:"彻底",m:"洗净"},{n:"3.彩显(E6)",t:240,tp:"38°C",a:"标准",m:"显色"}],
            E6_STD: [{n:"1.首显",t:390,tp:"38°C",a:"严格",m:"决定曝光密度"},{n:"2.彩显",t:270,tp:"38°C",a:"标准",m:"决定色彩表现"}],
            BW_D76: [{n:"1.显影(D76)",t:480,tp:"20°C",a:"常规",m:"参考卷身参数"},{n:"2.定影",t:300,tp:"20°C",a:"标准",m:"黑白定影"}],
            Kodak2460: [{n:"1.显影(D76)",t:330,tp:"20°C",a:"极轻微",m:"高反差卷防过冲"},{n:"2.定影",t:300,tp:"20°C",a:"标准",m:"5分钟"}]
        };

        let sIdx = 0, time = 0, total = 0, timer = null;

        function init() {
            const rKey = document.getElementById('recipe-sel').value;
            const tKey = document.getElementById('tank-sel').value;
            const rolls = document.getElementById('rolls').value;
            const comp = parseInt(document.getElementById('comp-slide').value);

            let vol = TANKS[tKey];
            // 药量逻辑：JOBO按卷累加；LabBox/Paterson按单次操作计算
            if(tKey.startsWith('j')) vol = vol * rolls;
            
            document.getElementById('vol-out').innerText = vol + "ml";
            document.getElementById('comp-out').innerText = comp + "%";
            document.getElementById('step-count').innerText = DATA[rKey].length;
            
            sIdx = 0;
            loadStep();
        }

        function loadStep() {
            const rKey = document.getElementById('recipe-sel').value;
            const comp = parseInt(document.getElementById('comp-slide').value);
            const step = DATA[rKey][sIdx];
            
            let baseT = step.t;
            let finalT = (step.n.includes("显")) ? Math.round(baseT * (1 + comp/100)) : baseT;
            
            time = finalT; total = finalT;
            document.getElementById('step-display').innerText = step.n;
            document.getElementById('m-temp').innerText = step.tp;
            document.getElementById('m-action').innerText = step.a;
            document.getElementById('m-note').innerText = step.m;
            document.getElementById('timer-display').innerText = fmt(time);
            document.getElementById('progress-fill').style.width = "0%";
            document.getElementById('t-panel').classList.remove('finished');
        }

        function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

        function startTimer() {
            if(timer) return;
            noSleep.enable();
            timer = setInterval(() => {
                if(time > 0) {
                    time--;
                    document.getElementById('timer-display').innerText = fmt(time);
                    document.getElementById('progress-fill').style.width = ((total-time)/total*100) + "%";
                } else {
                    clearInterval(timer); timer = null;
                    document.getElementById('t-panel').classList.add('finished');
                    beep();
                }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timer); timer = null; }

        function nextStep() {
            const rKey = document.getElementById('recipe-sel').value;
            if(sIdx < DATA[rKey].length - 1) {
                sIdx++; pauseTimer(); loadStep();
            } else { alert("全流程完成！"); }
        }

        function beep() { try { const ac=new AudioContext(), os=ac.createOscillator(); os.connect(ac.destination); os.start(); os.stop(ac.currentTime+0.5); } catch(e){} }

        init();
    </script>
</body>
</html>
