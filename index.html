<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胶片冲洗全能大师 Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0b; --card: #1c1c1e; --primary: #ff9800;
            --secondary: #00e5ff; --text: #f0f0f0;
            --success: #4caf50; --danger: #f44336;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .config-box { width: 100%; max-width: 500px; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #333; }
        label { font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 0.9rem; margin-bottom: 12px; }
        
        .stat-grid { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-item { background: var(--card); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-item small { display: block; font-size: 0.6rem; color: #888; margin-bottom: 2px; }
        .stat-item b { display: block; color: var(--secondary); font-size: 0.9rem; }

        .timer-panel { width: 100%; max-width: 500px; background: #000; border-radius: 24px; padding: 25px; text-align: center; border-bottom: 6px solid var(--primary); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        #timer { font-size: 6.5rem; font-weight: 900; margin: 10px 0; font-variant-numeric: tabular-nums; letter-spacing: -2px; }
        .prog-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #prog-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s linear; }
        
        .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; font-size: 0.8rem; }
        .meta-box { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .btn-group { display: flex; gap: 12px; width: 100%; max-width: 500px; margin-top: 15px; }
        button { flex: 1; padding: 18px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-start { background: var(--success); } .btn-pause { background: var(--danger); } .btn-next { background: #333; }
        
        @keyframes flash { 50% { background: #400; } } .alarm { animation: flash 0.5s infinite; }
    </style>
</head>
<body>

    <div class="config-box">
        <label>1. 冲洗工艺 (PROCESS)</label>
        <select id="proc-sel" onchange="syncModels()"></select>

        <label>2. 胶片品牌与型号 (FILM)</label>
        <select id="film-sel" onchange="init()"></select>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>
                <label>3. 显影罐</label>
                <select id="tank-sel" onchange="init()">
                    <option value="lb135r">Lab-Box 135滚</option>
                    <option value="lb135i">Lab-Box 135手</option>
                    <option value="j1510r">JOBO 1510滚</option>
                    <option value="p1">Paterson单</option>
                    <option value="upb16">UPB-16(16mm)</option>
                </select>
            </div>
            <div>
                <label>4. 过期时长</label>
                <select id="exp-sel" onchange="init()">
                    <option value="0">新鲜</option>
                    <option value="10">5-10年(+10%)</option>
                    <option value="25">10-20年(+25%)</option>
                    <option value="40">20年+(+40%)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-item"><small>注药量</small><b id="v-out">--</b></div>
        <div class="stat-item"><small>疲劳补偿</small><b id="p-out">0%</b></div>
        <div class="stat-item"><small>总时间</small><b id="t-out">--</b></div>
    </div>

    <input type="range" id="comp-slide" min="0" max="30" step="5" value="0" style="width:100%; max-width:500px; margin-bottom:15px;" oninput="init()">

    <div class="timer-panel" id="panel">
        <div id="step-name" style="color:var(--primary); font-size:1.2rem; font-weight:bold;">请选择胶片</div>
        <div id="timer">00:00</div>
        <div class="prog-bg"><div id="prog-fill"></div></div>
        <div class="meta">
            <div class="meta-box"><small>🌡️ 目标温度</small><div id="m-temp">--</div></div>
            <div class="meta-box"><small>🔄 搅拌动作</small><div id="m-act">--</div></div>
            <div class="meta-box" style="grid-column: span 2;"><small>💡 贴士</small><div id="m-note">--</div></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-start" onclick="run()">开始计时</button>
        <button class="btn-pause" onclick="stop()">暂停</button>
        <button class="btn-next" onclick="next()">跳过/下一步</button>
    </div>

    <script>
        const noSleep = new NoSleep();
        const TANKS = { lb135r:270, lb135i:490, j1510r:140, p1:290, upb16:1200 };

        const DB = {
            "C-41 标准负片": {
                "Kodak Gold/UltraMax/ColorPlus": 195, "Kodak Portra 160/400/800": 195, "Kodak Ektar 100": 195,
                "Fuji C200/400 / Superia": 195, "Lucky 乐凯 C200": 205, "Phoenix 凤凰 200": 195,
                "CineStill 800T/50D": 195, "Lomo Color Negative": 195, "Rollei CN200": 195
            },
            "ECN-2 电影卷": {
                "Kodak 5207 (250D)": 180, "Kodak 5219 (500T)": 180, "Kodak 5203 (50D)": 180, "Fuji Eterna 系列": 180, "Lomo 电影卷": 180
            },
            "E-6 标准反转片": {
                "Fuji Provia 100F": 360, "Fuji Velvia 50/100": 360, "Kodak Ektachrome E100": 360, "Rollei CR200": 360
            },
            "X-PRO 负片正冲": {
                "Kodak Gold (in E6)": 390, "Kodak UltraMax (in E6)": 390, "Fuji C200 (in E6)": 390, "Agfa CT (in C41)": 195
            },
            "B&W 黑白工艺": {
                "Ilford HP5 Plus": 450, "Ilford FP4 Plus": 480, "Ilford Delta 100/400/3200": 540,
                "Fomapan 100/200/400": 420, "Kodak Tri-X 400": 465, "Kodak T-Max 100/400": 480,
                "Lucky SHD 100 New": 360, "Kentmere 100/400": 450, "Shanghai 上海 GP3": 420
            }
        };

        const STEPS = {
            "C-41 标准负片": [{n:"预洗",t:60,tp:"38°",a:"慢"},{n:"彩显",isDev:true},{n:"漂定",t:390,tp:"38°",a:"常规"},{n:"水洗",t:180,tp:"35°",a:"换水"}],
            "ECN-2 电影卷": [{n:"除碳",t:60,tp:"38°",a:"强"},{n:"电影彩显",isDev:true,tp:"41.1°"},{n:"停影",t:30,tp:"38°",a:"连"},{n:"漂定",t:360,tp:"38°",a:"常规"}],
            "E-6 标准反转片": [{n:"首显",isDev:true,tp:"38°"},{n:"水洗",t:120,tp:"38°",a:"连"},{n:"彩显",t:360,tp:"38°",a:"常规"},{n:"漂定",t:360,tp:"38°",a:"常规"}],
            "X-PRO 负片正冲": [{n:"首显(E6)",isDev:true,tp:"38°"},{n:"水洗",t:120,tp:"38°",a:"连"},{n:"彩显(E6)",t:240,tp:"38°",a:"常规"}],
            "B&W 黑白工艺": [{n:"显影",isDev:true,tp:"20°"},{n:"停显",t:30,tp:"20°",a:"连"},{n:"定影",t:300,tp:"20°",a:"常规"}]
        };

        let sIdx=0, time=0, total=0, timer=null;

        function syncModels() {
            const p = document.getElementById('proc-sel').value;
            const f = document.getElementById('film-sel');
            f.innerHTML = "";
            for(let m in DB[p]) { f.add(new Option(m, m)); }
            init();
        }

        function init() {
            const p = document.getElementById('proc-sel').value;
            const m = document.getElementById('film-sel').value;
            const tank = document.getElementById('tank-sel').value;
            const pComp = parseInt(document.getElementById('comp-slide').value);
            const eComp = parseInt(document.getElementById('exp-sel').value);
            const totalComp = pComp + eComp;

            document.getElementById('v-out').innerText = TANKS[tank]+"ml";
            document.getElementById('p-out').innerText = pComp+"%";
            
            sIdx = 0;
            loadStep(STEPS[p], DB[p][m], totalComp);
        }

        function loadStep(steps, baseDevTime, totalComp) {
            const step = steps[sIdx];
            let dur = step.t || baseDevTime;
            if(step.isDev) dur = Math.round(dur * (1 + totalComp/100));

            time = dur; total = dur;
            document.getElementById('step-name').innerText = step.n;
            document.getElementById('m-temp').innerText = step.tp || "38°C";
            document.getElementById('m-act').innerText = step.a || "每30s翻转";
            document.getElementById('m-note').innerText = step.isDev ? "显影环节：已应用"+totalComp+"%补偿" : "常规步骤";
            document.getElementById('timer').innerText = fmt(time);
            document.getElementById('t-out').innerText = fmt(time);
            document.getElementById('prog-fill').style.width = "0%";
            document.getElementById('panel').classList.remove('alarm');
        }

        function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

        function run() {
            if(timer) return;
            noSleep.enable();
            timer = setInterval(() => {
                if(time > 0) {
                    time--;
                    document.getElementById('timer').innerText = fmt(time);
                    document.getElementById('prog-fill').style.width = ((total-time)/total*100) + "%";
                } else {
                    clearInterval(timer); timer = null;
                    document.getElementById('panel').classList.add('alarm');
                    beep();
                }
            }, 1000);
        }

        function stop() { clearInterval(timer); timer = null; }

        function next() {
            const p = document.getElementById('proc-sel').value;
            const m = document.getElementById('film-sel').value;
            const tc = parseInt(document.getElementById('comp-slide').value) + parseInt(document.getElementById('exp-sel').value);
            if(sIdx < STEPS[p].length - 1) {
                sIdx++; stop(); loadStep(STEPS[p], DB[p][m], tc);
            } else { alert("全流程完成！"); }
        }

        function beep() { try { const ac=new AudioContext(), os=ac.createOscillator(); os.connect(ac.destination); os.start(); os.stop(ac.currentTime+0.5); } catch(e){} }

        const ps = document.getElementById('proc-sel');
        for(let k in DB) { ps.add(new Option(k, k)); }
        syncModels();
    </script>
</body>
</html>
