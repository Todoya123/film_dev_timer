<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗房全能大师 - Pro Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --primary: #fbbf24;
            --secondary: #22d3ee; --text: #f4f4f5;
            --success: #10b981; --danger: #ef4444; --accent: #a855f7;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .tabs { display: flex; width: 100%; max-width: 600px; background: #27272a; border-radius: 12px; margin-bottom: 12px; padding: 4px; overflow-x: auto; }
        .tab { flex: 1; min-width: 80px; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 0.85rem; transition: 0.3s; white-space: nowrap; }
        .tab.active { background: var(--primary); color: #000; }

        .view-section { width: 100%; max-width: 600px; display: none; }
        .view-section.active { display: block; }

        .config-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #27272a; }
        label { font-size: 0.7rem; color: var(--primary); font-weight: 600; margin-bottom: 4px; display: block; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #3f3f46; background: #09090b; color: #fff; font-size: 0.9rem; margin-bottom: 10px; box-sizing: border-box; }
        
        /* 计时器面板 */
        .timer-panel { background: #000; border-radius: 20px; padding: 20px; text-align: center; border-bottom: 5px solid var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        #timer { font-size: 5.5rem; font-weight: 900; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .prog-bg { width: 100%; height: 6px; background: #27272a; border-radius: 3px; overflow: hidden; margin-bottom: 15px; }
        #prog-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s linear; }
        
        .meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: left; }
        .meta-box { background: #18181b; padding: 8px; border-radius: 8px; border: 1px solid #27272a; font-size: 0.75rem; }

        /* 计算器样式 */
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .res-box { background: #000; padding: 15px; border-radius: 10px; border-left: 4px solid var(--secondary); margin-top: 5px; }
        .res-box b { color: var(--secondary); font-size: 1.2rem; }

        .lab-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .lab-table td { padding: 8px; border-bottom: 1px solid #27272a; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--success); } .btn-next { background: #3f3f46; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('timer-view')">⏱️ 计时器</div>
        <div class="tab" onclick="switchTab('lab-view')">🧪 药水配比</div>
        <div class="tab" onclick="switchTab('calc-view')">🧮 计算助手</div>
    </div>

    <div id="timer-view" class="view-section active">
        <div class="config-box">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>冲洗工艺</label>
                    <select id="proc-sel" onchange="syncModels()"></select>
                </div>
                <div style="flex:1;">
                    <label>底片/药水组合</label>
                    <select id="film-sel" onchange="initTimer()"></select>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <select id="tank-sel" onchange="initTimer()" style="flex:1;">
                    <option value="500">JOBO 1520 (500ml)</option>
                    <option value="270">Lab-Box (270ml)</option>
                    <option value="1500">UPB-1A (1.5L)</option>
                    <option value="290">Paterson (290ml)</option>
                </select>
                <input type="number" id="manual-comp" placeholder="补偿 %" value="0" oninput="initTimer()" style="flex:0.5;">
            </div>
        </div>

        <div class="timer-panel" id="panel">
            <div id="step-name" style="color:var(--primary); font-weight:bold; font-size:1.1rem;">READY</div>
            <div id="timer">00:00</div>
            <div class="prog-bg"><div id="prog-fill"></div></div>
            <div class="meta">
                <div class="meta-box"><small>🌡️ 目标</small><div id="m-temp">--</div></div>
                <div class="meta-box"><small>🧪 pH</small><div id="m-ph">--</div></div>
                <div class="meta-box"><small>🔄 翻转</small><div>标准旋转</div></div>
                <div class="meta-box" style="grid-column: span 3;"><small>📝 操作提示 (Ilford/Coofilm标准)</small><div id="m-note">--</div></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-start" onclick="run()">开始</button>
            <button style="background:var(--danger);" onclick="stop()">暂停</button>
            <button class="btn-next" onclick="next()">下一步</button>
        </div>
    </div>

    <div id="lab-view" class="view-section">
        <div class="config-box">
            <label>套药选择</label>
            <select id="kit-sel" onchange="updateLab()">
                <option value="ecn2_gg">Kodak ECN-2 (龟龟分装)</option>
                <option value="e6_fuji">Fuji Hunt E6 专业套药</option>
                <option value="c41_std">Standard C-41 (工作液)</option>
            </select>
            <label>目标配制总量 (ml)</label>
            <input type="number" id="lab-input" value="500" oninput="updateLab()">
            
            <div class="res-box" style="border-left-color:var(--primary);">
                <table class="lab-table" id="lab-table"></table>
            </div>
        </div>
    </div>

    <div id="calc-view" class="view-section">
        <div class="config-box">
            <label>1. Ilford 温度时间转换 (B&W)</label>
            <div class="calc-row">
                <input type="number" id="base-time" placeholder="20°C基准时间(分)" value="6">
                <input type="number" id="target-temp" placeholder="当前液温(°C)" value="24">
            </div>
            <div class="res-box">转换后时间：<b id="temp-res">--</b> 分钟</div>
            <p style="font-size:0.6rem; color:#71717a;">依据 Ilford Temperature Compensation Chart 计算</p>
        </div>

        <div class="config-box">
            <label>2. 倒易律失效补偿 (Schwarzschild Effect)</label>
            <label>测光表读数 (秒)</label>
            <input type="number" id="meter-sec" value="10">
            <div class="res-box">实际曝光时间：<b id="recip-res">--</b> 秒</div>
            <p style="font-size:0.6rem; color:#71717a;">适用于 Ilford HP5+/FP4+/Delta 系列。计算公式: t_adj = t^1.31</p>
        </div>
    </div>

    <script>
        const noSleep = new NoSleep();
        
        // 1. 完善的工艺流程数据库
        const PROCESS_STEPS = {
            "ECN-2 (电影工艺)": [
                {n:"除碳",t:60,tp:"27±1°C",m:"除碳前禁止水洗。停留20秒后倒出，清水洗至无黑水。"},
                {n:"预热水洗",t:30,tp:"42°C",m:"Ilford建议：预热可确保彩显不掉温。"},
                {n:"电影彩显",isDev:true,tp:"41.1±0.1°C",m:"41.1度是硬标准。误差>0.1度会导致偏色。"},
                {n:"停显",t:30,tp:"27-38°C",m:"中和彩显，防止过度发育。"},
                {n:"漂白",t:195,tp:"27±1°C",m:"漂白不足会导致暗部发绿。每冲2卷+20秒。"},
                {n:"定影",t:180,tp:"38±1°C",m:"11卷后时间固定为8分钟。"},
                {n:"省水水洗",t:120,tp:"27-38°C",m:"Ilford法：换水3次，分别翻转5/10/20次。"},
                {n:"稳定",t:60,tp:"27-38°C",m:"结束后不要再过水，直接挂干。"}
            ],
            "C-41 (标准彩负)": [
                {n:"预洗",t:60,tp:"38°C",m:"软化药膜，预热显影罐。"},
                {n:"彩显",isDev:true,tp:"38±0.3°C",m:"标准3分15秒。"},
                {n:"漂白",t:360,tp:"35-40°C",m:"-"},
                {n:"定影",t:360,tp:"35-40°C",m:"-"},
                {n:"水洗",t:180,tp:"30-35°C",m:"使用Ilford省水洗法更佳。"},
                {n:"稳定",t:60,tp:"常温",m:"防霉防滴痕。"}
            ],
            "B&W (Ilford标准)": [
                {n:"显影",isDev:true,tp:"20°C",m:"搅拌：前30秒连续，后每分钟前10秒翻转2次。"},
                {n:"停显",t:30,tp:"20°C",m:"保护定影液寿命。"},
                {n:"定影",t:300,tp:"20°C",m:"定影至底片完全通透。"},
                {n:"Ilford省水洗",t:180,tp:"20°C",m:"1.满水翻转5次 2.换水翻转10次 3.换水翻转20次。"}
            ]
        };

        const FILM_DB = {
            "ECN-2 (电影工艺)": { "5207/5219 (GG套药)": 180, "5203 (低速卷)": 180 },
            "C-41 (标准彩负)": { "Kodak/Fuji/乐凯": 195 },
            "B&W (Ilford标准)": { "HP5+ (ID-11)": 450, "Delta 100 (ID-11)": 540, "FP4+ (ID-11)": 510 }
        };

        const LAB_CONFIG = {
            ecn2_gg: [
                {n:"电影彩显", r:[{m:"水",v:300},{m:"A液",v:71},{m:"B液",v:19},{m:"开始液",v:8},{m:"补水至",v:500}]},
                {n:"漂白液", r:[{m:"水",v:330},{m:"漂白原液",v:170}]},
                {n:"定影液", r:[{m:"水",v:350},{m:"定影原液",v:150}]}
            ],
            e6_fuji: [
                {n:"首显", r:[{m:"水",v:397.5},{m:"首显原",v:100},{m:"首显启",v:2.5}]},
                {n:"彩显", r:[{m:"水",v:312.5},{m:"彩A",v:92.5},{m:"彩B",v:92.5},{m:"彩启",v:2.5}]}
            ]
        };

        let sIdx=0, time=0, total=0, timer=null;

        function switchTab(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'calc-view') startCalcUpdate();
        }

        // --- 逻辑：计时器 ---
        function syncModels() {
            const p = document.getElementById('proc-sel').value;
            const f = document.getElementById('film-sel');
            f.innerHTML = "";
            for(let m in FILM_DB[p]) { f.add(new Option(m, m)); }
            initTimer();
        }

        function initTimer() {
            const p = document.getElementById('proc-sel').value;
            const m = document.getElementById('film-sel').value;
            const comp = parseInt(document.getElementById('manual-comp').value) || 0;
            sIdx = 0;
            loadStep(PROCESS_STEPS[p], FILM_DB[p][m], comp);
        }

        function loadStep(steps, baseTime, comp) {
            const step = steps[sIdx];
            let dur = step.t || baseTime;
            if(step.isDev) dur = Math.round(dur * (1 + comp/100));
            time = dur; total = dur;
            document.getElementById('step-name').innerText = step.n;
            document.getElementById('timer').innerText = fmt(time);
            document.getElementById('m-temp').innerText = step.tp || "20°C";
            document.getElementById('m-note').innerText = step.m;
            document.getElementById('prog-fill').style.width = "0%";
        }

        function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

        function run() {
            if(timer) return;
            noSleep.enable();
            timer = setInterval(() => {
                if(time > 0) {
                    time--;
                    document.getElementById('timer').innerText = fmt(time);
                    document.getElementById('prog-fill').style.width = ((total-time)/total*100) + "%";
                } else {
                    clearInterval(timer); timer = null;
                    beep();
                }
            }, 1000);
        }

        function stop() { clearInterval(timer); timer = null; }
        function next() {
            const p = document.getElementById('proc-sel').value;
            const m = document.getElementById('film-sel').value;
            if(sIdx < PROCESS_STEPS[p].length - 1) { sIdx++; stop(); loadStep(PROCESS_STEPS[p], FILM_DB[p][m], 0); }
        }

        // --- 逻辑：计算助手 ---
        function startCalcUpdate() {
            const inputs = ['base-time', 'target-temp', 'meter-sec'];
            inputs.forEach(id => document.getElementById(id).oninput = doCalcs);
            doCalcs();
        }

        function doCalcs() {
            // 温度转换 (Ilford 公式近似)
            const bt = parseFloat(document.getElementById('base-time').value);
            const tt = parseFloat(document.getElementById('target-temp').value);
            // Ilford补偿系数: log(time) 对温度呈线性
            const factor = Math.pow(0.91, tt - 20); 
            document.getElementById('temp-res').innerText = (bt * factor).toFixed(1);

            // 倒易律 (Ilford 官方推荐公式: t_adjusted = t_metered ^ 1.31)
            const ms = parseFloat(document.getElementById('meter-sec').value);
            if(ms >= 1) {
                const rs = Math.pow(ms, 1.31);
                document.getElementById('recip-res').innerText = Math.round(rs);
            } else {
                document.getElementById('recip-res').innerText = ms;
            }
        }

        // --- 逻辑：药水实验室 ---
        function updateLab() {
            const kit = document.getElementById('kit-sel').value;
            const target = parseFloat(document.getElementById('lab-input').value) || 500;
            const table = document.getElementById('lab-table');
            table.innerHTML = "";
            const data = LAB_CONFIG[kit];
            if(!data) return;

            data.forEach(step => {
                const f = target / 500;
                step.r.forEach((item, i) => {
                    const row = table.insertRow();
                    if(i===0) row.insertCell().innerHTML = `<b>${step.n}</b>`;
                    else row.insertCell();
                    row.insertCell().innerText = item.m;
                    row.insertCell().innerText = (item.v * f).toFixed(1) + "ml";
                });
            });
        }

        function beep() { try { const ac=new AudioContext(), os=ac.createOscillator(); os.connect(ac.destination); os.start(); os.stop(ac.currentTime+0.5); } catch(e){} }

        // 初始化
        for(let k in PROCESS_STEPS) document.getElementById('proc-sel').add(new Option(k, k));
        syncModels();
        updateLab();
    </script>
</body>
</html>
